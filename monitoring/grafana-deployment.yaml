apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: expensy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_PATHS_DATA
          value: "/grafana-storage"
   
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: storage
          mountPath:  /grafana-storage
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: storage
        persistentVolumeClaim:
          claimName: grafana-storage
