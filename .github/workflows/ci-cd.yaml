name: Build and Deploy to AKS

on:
  push:
    branches: [ main, cicd, monitoring,security ]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CLUSTER_NAME: ${{ secrets.AZURE_CLUSTER_NAME }}

jobs:
  # STAGE 1: BUILD
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Backend
        run: |
          cd expensy_backend
          npm install
          npm run build

      - name: Build Frontend
        run: |
          cd expensy_frontend
          npm install
          npm run build
 
  # STAGE 2: TEST
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Test Backend
        run: |
          cd expensy_backend
          npm install
          npm run lint --if-present
          npm test --if-present
        continue-on-error: true

      - name: Test Frontend
        run: |
          cd expensy_frontend
          npm install
          npm run lint --if-present
          npm test --if-present
        continue-on-error: true

  # STAGE 3: DOCKER BUILD & PUSH
  # docker-build-push:
  #   runs-on: ubuntu-latest
  #   needs: test
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Login to Docker Hub
  #       uses: docker/login-action@v3
  #       with:
  #         username: ${{ secrets.DOCKERHUB_USERNAME }}
  #         password: ${{ secrets.DOCKERHUB_TOKEN }}

  #     - name: Build and Push Backend Image
  #       uses: docker/build-push-action@v5
  #       with:
  #         context: ./expensy_backend
  #         push: true
  #         tags: ${{ secrets.DOCKERHUB_USERNAME }}/expensy-backend:latest

  #     - name: Build and Push Frontend Image
  #       uses: docker/build-push-action@v5
  #       with:
  #         context: ./expensy_frontend
  #         push: true
  #         tags: ${{ secrets.DOCKERHUB_USERNAME }}/expensy-frontend:latest

  # STAGE 4: DEPLOY TO AKS
  deploy-aks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Setup Azure DNS and Cert-Manager
        run: |
          # Update Azure DNS Label
          PUBLIC_IP_ID=$(az network public-ip list --query "[?ipAddress=='20.23.180.96'].id" -o tsv)
          az network public-ip update --ids $PUBLIC_IP_ID --dns-name expensy-lara
          
          # Setup Helm and Cert-Manager
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace --set installCRDs=true

      - name: Deploy to Kubernetes
        run: |
          # Apply Namespace/Configmap
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          
          # Apply Secrets from GitHub Actions
          kubectl create namespace expensy --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic expensy-secrets \
            --namespace=expensy \
            --from-literal=MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }} \
            --from-literal=MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --from-literal=DATABASE_URI=${{ secrets.DATABASE_URI }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Apply Databases/Infrastructure
          kubectl apply -f k8s/mongo-service.yaml
          kubectl apply -f k8s/mongo-deployment.yaml
          kubectl apply -f k8s/redis-service.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          
          # Apply Applications
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          
          # Apply Ingress & Network Policy
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f security/network-policy.yaml

          # Apply Cert-Manager Config 
          kubectl apply -f security/cert-manager.yaml
      - name: Deploy Monitoring Stack
        run: |
            kubectl apply -f monitoring/pvc2-deployment.yaml
            kubectl apply -f monitoring/configmap2.yaml
            kubectl apply -f monitoring/grafana-deployment.yaml
            kubectl apply -f monitoring/grafana-service.yaml
            kubectl apply -f monitoring/node-exporter.yaml
            kubectl apply -f monitoring/node-service.yaml
            kubectl apply -f monitoring/prometheus-deployment.yaml
            kubectl apply -f monitoring/prometheus-service.yaml
    
      - name: Refresh Application Pods
        run: |
          kubectl rollout restart deployment frontend -n expensy
          kubectl rollout restart deployment backend -n expensy
    
      - name: Verify Deployment
        run: |
          kubectl get pods -n expensy
          kubectl get svc -n expensy
          kubectl get ingress -n expensy
          kubectl get certificate -n expensy